org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Work around Kotlin incremental cache failures ("Storage ... is already registered")
# seen with Kotlin 2.2.x when multiple compile tasks run; fixes missing plugin classes
# (e.g. SharePlusPlugin) and cascading Java errors in GeneratedPluginRegistrant.
kotlin.incremental=false
kotlin.compiler.execution.strategy=in-process
