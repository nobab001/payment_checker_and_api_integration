name: payment_checker
description: Telecom SMS Tracker for Bangladesh (bKash, Nagad, Rocket, Upay)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase (admin entrypoint [lib/main_admin.dart] only — user app uses VPS API).
  firebase_core: ^3.3.0

  # SMS listener (Android only)
  telephony: ^0.2.0

  # State management
  provider: ^6.1.2

  # Local storage
  path_provider: ^2.1.3

  # Export / share file
  share_plus: ^9.0.0

  # Permissions
  permission_handler: ^11.3.1

  # Remember optional notification prompt (first open only)
  shared_preferences: ^2.3.3

  # Date formatting
  intl: ^0.19.0

  # Social media icons
  font_awesome_flutter: ^10.7.0

  # URL launcher for social links
  url_launcher: ^6.3.0

  # bKash checkout WebView
  webview_flutter: ^4.10.0

  # Admin app — imported as a path dependency so lib/main_admin.dart can
  # use AdminDashboardScreen and its providers directly from this project.
  payment_checker_admin:
    path: ./admin

  # SMS Sync: local queue DB
  sqflite: ^2.4.2
  path: ^1.9.1

  # SMS Sync: HTTP client (sub-device pushes to main)
  http: ^1.4.0

  # SMS Sync: HTTP server (main device receives from subs)
  shelf: ^1.4.2

  # SMS Sync: fast network pre-check before HTTP push
  connectivity_plus: ^6.1.4

  # SMS Sync: background periodic flush even when app is killed
  # 0.5.x uses removed Flutter v1 embedding APIs and fails on modern Gradle/Kotlin.
  workmanager: ^0.9.0+3

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  # Android: when `--flavor` is omitted, Gradle uses `user` (explicit `--flavor admin` overrides).
  default-flavor: user
