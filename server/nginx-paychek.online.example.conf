# Example for paychek.online behind CloudPanel / nginx
#
# IMPORTANT: Do NOT use "listen 3000" on nginx if your Node API already uses port 3000.
# Only one process can bind to a port. Use nginx on 80/443 and proxy to 127.0.0.1:3000.
#
# In .env for the API (recommended behind reverse proxy):
#   HOST=127.0.0.1
#   PORT=3000
# So Node is not exposed publicly; only nginx on 443 is public.

# --- HTTP → HTTPS (optional if CloudPanel already handles) ---
# server {
#   listen 80;
#   listen [::]:80;
#   server_name www.paychek.online;
#   return 301 https://paychek.online$request_uri;
# }

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  # listen 443 quic;   # enable only if http3 is fully configured
  # listen [::]:443 quic;
  http2 on;
  # http3 off;

  {{ssl_certificate_key}}
  {{ssl_certificate}}

  server_name www.paychek.online;
  return 301 https://paychek.online$request_uri;
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  # listen 443 quic;
  # listen [::]:443 quic;
  http2 on;

  {{ssl_certificate_key}}
  {{ssl_certificate}}

  server_name paychek.online www1.paychek.online;

  {{root}}
  {{nginx_access_log}}
  {{nginx_error_log}}

  if ($scheme != "https") {
    rewrite ^ https://$host$request_uri permanent;
  }

  location ~ /.well-known {
    auth_basic off;
    allow all;
  }

  {{settings}}
  include /etc/nginx/global_settings;

  index index.html;

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_cache_bypass $http_upgrade;

    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
  }
}
